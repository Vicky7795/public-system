name: Keep Alive
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render App
        run: |
          curl -s https://public-system.onrender.com/health || echo "Ping failed, but workflow continues"
