services:
  # 1. AI Service (Python)
  - type: web
    name: public-grievance-ai
    runtime: python
    rootDir: ai-model
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0

  # 2. Backend Server (Node.js)
  - type: web
    name: public-grievance-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGODB_URI
        value: mongodb+srv://nagarevivek206_db_user:7sEHEKssevVynHVB@cluster0.sqyv5qq.mongodb.net/pgrs?retryWrites=true&w=majority&appName=Cluster0
      - key: AI_SERVICE_URL
        value: https://public-grievance-ai.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        value: 225202389234-1mu2smt3l6265cj9rskmnsr8aeoai97c.apps.googleusercontent.com
      - key: NODE_ENV
        value: production

  # 3. Frontend (Static Site)
  - type: static
    name: public-grievance-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://public-system-1.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
