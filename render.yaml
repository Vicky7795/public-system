services:
  # 1. AI Service (Python)
  - type: web
    name: public-grievance-ai
    runtime: python
    rootDir: ai-model
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0

  # 2. Backend Server (Node.js)
  - type: web
    name: public-grievance-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGODB_URI
        sync: false # This will ask you for the link once
      - key: AI_SERVICE_URL
        fromService:
          name: public-grievance-ai
          type: web
          property: host
      - key: JWT_SECRET
        generateValue: true # Generates a random one-time key for you!

  # 3. Frontend (Static Site)
  - type: static
    name: public-grievance-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: dist
